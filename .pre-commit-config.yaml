default_language_version:
  python: python3

# NOTE: Update in .flake8 pyproject.toml as well
exclude: |
    (?x)^(
      \.git|
      __pycache__|
      \.venv
    )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: check-yaml
        args: [--unsafe]
        exclude: ^helm/templates/
      - id: debug-statements
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: detect-private-key
      - id: name-tests-test
        args: [--pytest-test-first]
        # Helpers under tests/utils/ are not pytest modules; keep their real names.
        exclude: ^tests/utils/(stac_io_mock|golden_export_compare)\.py$
      - id: debug-statements
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=100]

  # Run the Ruff linter.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      # Linter
      - id: ruff
        types_or: [python, pyi, jupyter, toml]
        files: (^|/).*\.(py|pyi|ipynb)$|(^|/)pyproject\.toml$
        args: [--fix, --exit-non-zero-on-fix]
      # Formatter
      - id: ruff-format
        types_or: [python, pyi, jupyter, toml]
        files: (^|/).*\.(py|pyi|ipynb)$|(^|/)pyproject\.toml$

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.7
    hooks:
      - id: uv-lock
        args: ["--locked"]

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.409
    hooks:
      - id: pyright
